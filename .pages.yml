media:
  input: public
  output: /
  rename: safe
  categories: [image]

content:
  - name: blog
    label: Blog posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{primary}.mdx"
    view:
      fields: [title, pubDate, author, tags, draft]
      primary: title
      sort: pubDate
      order: desc
      search: true
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
        required: true
      - name: pubDate
        type: date
        required: true
      - name: updatedDate
        type: date
      - name: author
        type: reference
        collection: authors
        required: true
      - name: image
        type: image
      - name: tags
        type: list
        items:
          type: string
      - name: draft
        type: boolean
        default: false

  - name: changelog
    label: Changelog
    type: collection
    path: src/content/changelog
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      fields: [version, date, title, type]
      primary: version
      sort: date
      order: desc
      search: true
    fields:
      - name: version
        type: string
        required: true
      - name: date
        type: date
        required: true
      - name: title
        type: string
        required: true
      - name: type
        type: select
        options:
          - label: Major
            value: major
          - label: Minor
            value: minor
          - label: Patch
            value: patch
        default: minor

  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    format: json
    filename: "{primary}.json"
    view:
      fields: [name, role]
      primary: name
      search: true
    fields:
      - name: name
        type: string
        required: true
      - name: role
        type: string
        required: true
      - name: avatar
        type: image
        required: true
      - name: bio
        type: text
        required: true
      - name: twitter
        type: string
      - name: github
        type: string

  - name: homepage
    label: Homepage
    type: file
    path: src/data/homepage.json
    format: json
    fields:
      - name: hero
        type: object
        fields:
          - name: badge
            type: string
          - name: headline
            type: text
          - name: subheadline
            type: text
          - name: ctaPrimary
            type: string
          - name: ctaPrimaryHref
            type: string
          - name: ctaSecondary
            type: string
          - name: ctaSecondaryHref
            type: string
      - name: features
        type: object
        fields:
          - name: heading
            type: text
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: title
                type: string
              - name: description
                type: text
      - name: testimonials
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: quote
                type: text
              - name: author
                type: string
              - name: role
                type: string
              - name: avatar
                type: image
      - name: pricing
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: toggleMonthly
            type: string
          - name: toggleAnnual
            type: string
          - name: toggleBadge
            type: string
          - name: plans
            type: object
            list: true
            fields:
              - name: name
                type: string
              - name: description
                type: text
              - name: priceMonthly
                type: string
              - name: priceAnnual
                type: string
              - name: buttonLabel
                type: string
              - name: buttonVariant
                type: string
              - name: popular
                type: boolean
              - name: popularBadge
                type: string
              - name: features
                type: list
                items:
                  type: string
      - name: faq
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: question
                type: string
              - name: answer
                type: text
      - name: cta
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: ctaPrimary
            type: string
          - name: ctaPrimaryHref
            type: string
          - name: ctaSecondary
            type: string
          - name: ctaSecondaryHref
            type: string

  - name: vidual-editor
    label: Vidual Editor
    type: file
    path: src/data/vidual-editor.json
    format: json
    fields:
      - name: hero
        type: object
        fields:
          - name: badge
            type: string
          - name: headline
            type: text
          - name: subheadline
            type: text
          - name: ctaPrimary
            type: string
          - name: ctaPrimaryHref
            type: string
          - name: ctaSecondary
            type: string
          - name: ctaSecondaryHref
            type: string
      - name: tabs
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: id
                type: string
              - name: label
                type: string
              - name: sublabel
                type: string
              - name: title
                type: string
              - name: description
                type: text
              - name: features
                type: list
                items:
                  type: string
      - name: features
        type: object
        fields:
          - name: heading
            type: text
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: title
                type: string
              - name: description
                type: text
      - name: pricing
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: planName
            type: string
          - name: planDescription
            type: text
          - name: price
            type: string
          - name: priceLabel
            type: string
          - name: badge
            type: string
          - name: buttonLabel
            type: string
          - name: features
            type: list
            items:
              type: string
          - name: footnote
            type: text
      - name: faq
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: items
            type: object
            list: true
            fields:
              - name: question
                type: string
              - name: answer
                type: text
      - name: cta
        type: object
        fields:
          - name: heading
            type: string
          - name: subtitle
            type: text
          - name: ctaPrimary
            type: string
          - name: ctaPrimaryHref
            type: string
          - name: ctaSecondary
            type: string
          - name: ctaSecondaryHref
            type: string

actions:
  - name: deploy-preview
    label: Deploy preview
    workflow: deploy.yml
    ref: current
    confirm:
      title: Deploy preview?
      message: Build and deploy this branch as a preview on Cloudflare Pages.
      button: Deploy

settings:
  commit:
    identity: app
    templates:
      create: "content({action}): {path} [skip ci]"
      update: "content({action}): {path} [skip ci]"
      delete: "content({action}): {path} [skip ci]"
      rename: "content({action}): {oldPath} -> {newPath} [skip ci]"
