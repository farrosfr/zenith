name: Create PR to master

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(github.event.inputs.payload).repository.sha }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(echo '${{ github.event.inputs.payload }}' | jq -r '.repository.ref')
          PR_EXISTS=$(gh pr list --head "$BRANCH" --json id --jq 'length')
          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "CMS: $BRANCH" \
              --body "Automated PR from Pages CMS. Merge to deploy to production." \
              --label "cms"
          fi
