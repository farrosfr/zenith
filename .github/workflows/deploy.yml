name: Deploy preview

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(github.event.inputs.payload).repository.sha }}

      - name: Trigger Cloudflare Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(echo '${{ github.event.inputs.payload }}' | jq -r '.repository.ref')
          git config user.name "zenix-cms"
          git config user.email "cms@zenix.app"
          git commit --allow-empty -m "ci: trigger preview build"
          git push origin HEAD:"$BRANCH"
