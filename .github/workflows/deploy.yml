name: Deploy preview

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger Cloudflare Pages build
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: 4b2c65e127e12b9de8762c74625992ee
        run: |
          BRANCH=$(echo '${{ github.event.inputs.payload }}' | jq -r '.repository.ref')
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/zenix-test/deployments" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"$BRANCH\"}"
